name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Disable Flutter Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Read version
        id: version
        run: |
          echo "name=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d+ -f1)" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        env:
          MACOS_DEVID_CERT_P12_BASE64: ${{ secrets.MACOS_DEVID_CERT_P12_BASE64 }}
          MACOS_DEVID_CERT_PASSWORD: ${{ secrets.MACOS_DEVID_CERT_PASSWORD }}
        run: |
          if [ -z "$MACOS_DEVID_CERT_P12_BASE64" ]; then
            echo "::error::MACOS_DEVID_CERT_P12_BASE64 secret yok — imzalama yapılamaz."
            exit 1
          fi
          KEYCHAIN="$RUNNER_TEMP/devid.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$MACOS_DEVID_CERT_P12_BASE64" | base64 -d > "$RUNNER_TEMP/devid.p12"
          security import "$RUNNER_TEMP/devid.p12" -k "$KEYCHAIN" \
            -P "$MACOS_DEVID_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # İmza arama listesine bu keychain'i ekle (mevcutları koru)
          EXISTING="$(security list-keychains -d user | sed 's/[\" ]//g')"
          security list-keychains -d user -s "$KEYCHAIN" $EXISTING
          rm -f "$RUNNER_TEMP/devid.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Prepare notary API key
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: printf '%s' "$APPSTORE_PRIVATE_KEY" > "$RUNNER_TEMP/notary_key.p8"

      - name: Install dependencies
        run: flutter pub get

      - name: Build, sign, notarize DMG
        env:
          NOTARY_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          NOTARY_KEY_FILE: ${{ runner.temp }}/notary_key.p8
        run: |
          chmod +x scripts/build_macos_dmg.sh
          ./scripts/build_macos_dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: DirectDrop-${{ steps.version.outputs.name }}-macos
          path: dist/macos/DirectDrop-*.dmg
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          TAG="v$VERSION"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "DirectDrop $VERSION" --notes "macOS kurulum dosyası (.dmg, notarized)."
          fi
          gh release upload "$TAG" \
            "dist/macos/DirectDrop-$VERSION.dmg" \
            "dist/macos/DirectDrop.dmg" --clobber
