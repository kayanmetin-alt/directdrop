name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        shell: pwsh
        run: |
          $line = Get-Content pubspec.yaml | Select-String '^version:\s*(.+)$'
          if (-not $line) { throw 'pubspec.yaml version not found' }
          $version = ($line.Line -replace '^version:\s*','').Split('+')[0].Trim()
          Write-Host "App version: $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Download VC++ Redistributable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path windows/installer/redist | Out-Null
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile windows/installer/redist/vc_redist.x64.exe

      - name: Write installer version file
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/write_installer_version.ps1
          Get-Content windows/installer/version.iss

      - name: Build installer
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "windows\installer\directdrop.iss"

      - name: Verify installer filename
        shell: pwsh
        run: |
          $expected = "dist/windows/DirectDrop-Setup-${{ steps.version.outputs.version }}.exe"
          if (-not (Test-Path $expected)) {
            Write-Host "Beklenen dosya yok: $expected"
            Write-Host "dist/windows içeriği:"
            Get-ChildItem dist/windows -ErrorAction SilentlyContinue
            throw "Installer dosya adı pubspec sürümüyle eşleşmiyor."
          }
          Write-Host "OK: $expected"

      # Artifact yüklemiyoruz: GitHub Actions artifact'ları her zaman .zip olarak
      # indirilir; zip'ten çıkarırken antivirüs yanlış pozitif verebilir.
      # Kurulum dosyası yalnızca GitHub Releases'a doğrudan .exe olarak gider.

      - name: Publish standalone installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "v$version"
          $file = "dist/windows/DirectDrop-Setup-$version.exe"
          $assetName = "DirectDrop-Setup-$version.exe"
          $repo = "${{ github.repository }}"
          $downloadUrl = "https://github.com/$repo/releases/download/$tag/$assetName"

          if (-not (Test-Path $file)) {
            throw "Kurulum dosyası bulunamadı: $file"
          }

          $notes = @"
          ## Windows kurulumu

          **Doğrudan kurulum dosyası (zip değil):** [$assetName]($downloadUrl)

          1. Yukarıdaki ``.exe`` dosyasını indirin.
          2. Zip arşivi açmanıza gerek yoktur — indirilen dosyaya çift tıklayın.
          3. Kurulum sihirbazını tamamlayın.

          > Actions sekmesindeki artifact indirmeleri otomatik olarak zip paketler.
          > Virüs tarayıcıları zip içinden çıkarma sırasında yanlış uyarı verebilir.
          > Yalnızca bu Releases sayfasından indirin.
          "@

          $view = gh release view $tag 2>&1
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "DirectDrop $version" --notes $notes --latest
          } else {
            gh release edit $tag --title "DirectDrop $version" --notes $notes --latest
          }

          # Yanlışlıkla yüklenmiş zip paketlerini kaldır.
          $zipIds = gh release view $tag --json assets --jq '.assets[] | select(.name | test("\\.zip$"; "i")) | .id'
          foreach ($assetId in $zipIds) {
            if ($assetId) {
              gh api -X DELETE "repos/$repo/releases/assets/$assetId"
              Write-Host "Kaldırıldı: zip asset $assetId"
            }
          }

          gh release upload $tag $file --clobber
          Write-Host "Yayınlandı: $tag -> $assetName ($downloadUrl)"
