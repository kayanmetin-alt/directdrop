name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Download VC++ Redistributable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path windows/installer/redist | Out-Null
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile windows/installer/redist/vc_redist.x64.exe

      - name: Build installer
        shell: pwsh
        run: |
          $version = ((Get-Content pubspec.yaml | Select-String '^version:\s*(.+)$').Line -replace '^version:\s*','').Split('+')[0].Trim()
          Write-Host "Installer version: $version"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" "windows\installer\directdrop.iss"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DirectDrop-Windows-Setup
          path: dist/windows/DirectDrop-Setup-*.exe
          if-no-files-found: error
