name: Release Mobile (App Store + Play Store)

on:
  workflow_dispatch:
    inputs:
      deploy_android:
        description: "Play Store'a yükle"
        type: boolean
        default: true
      deploy_ios:
        description: "App Store Connect'e yükle"
        type: boolean
        default: true
      play_track:
        description: "Play track (internal / alpha / beta / production)"
        type: string
        default: internal
  push:
    tags:
      - "v*"

jobs:
  release-android:
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Read version
        id: version
        run: |
          echo "name=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d+ -f1)" >> "$GITHUB_OUTPUT"

      - name: Setup Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret yok — debug imza ile derlenir (Play'e yüklenemez)."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../upload-keystore.jks
          EOF

      - run: flutter pub get
      - run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: DirectDrop-${{ steps.version.outputs.name }}-android
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Deploy to Play Store
        env:
          PLAY_STORE_JSON: ${{ secrets.PLAY_STORE_JSON }}
          PLAY_STORE_TRACK: ${{ github.event.inputs.play_track || 'internal' }}
        run: |
          if [ -z "$PLAY_STORE_JSON" ]; then
            echo "PLAY_STORE_JSON secret yok — yalnızca AAB artifact yüklendi."
            exit 0
          fi
          echo "$PLAY_STORE_JSON" > /tmp/play-store.json
          export PLAY_STORE_JSON_PATH=/tmp/play-store.json
          sudo gem install fastlane -NV
          cd fastlane && fastlane android deploy

  release-ios:
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_ios)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Disable Flutter Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Read version
        id: version
        run: |
          echo "name=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d+ -f1)" >> "$GITHUB_OUTPUT"

      - name: Configure App Store signing
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: bash scripts/ios_ci_signing.sh

      - run: flutter pub get
      - run: flutter build ios --config-only
      - run: cd ios && pod install && cd ..
      - run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DirectDrop-${{ steps.version.outputs.name }}-ios
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Upload App Store release notes
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          if [ -z "$APPSTORE_PRIVATE_KEY" ]; then
            echo "App Store API secret'ları yok — release notes atlandı."
            exit 0
          fi
          sudo gem install fastlane -NV
          cd fastlane && fastlane ios metadata_text

      - name: Deploy to App Store Connect
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          SUBMIT_FOR_REVIEW: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && 'true' || 'false' }}
        run: |
          if [ -z "$APPSTORE_PRIVATE_KEY" ]; then
            echo "App Store API secret'ları yok — yalnızca IPA artifact yüklendi."
            exit 0
          fi
          sudo gem install fastlane -NV
          cd fastlane && fastlane ios deploy
