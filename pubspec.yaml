name: directdrop
description: Cross-platform P2P file transfer over the internet using Firebase signaling and WebRTC.
publish_to: 'none'
version: 1.3.37+52

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_database: ^12.4.4
  flutter_webrtc: ^1.5.2
  file_picker: ^11.0.2
  desktop_drop: ^0.7.1
  path_provider: ^2.1.4
  path: ^1.9.0
  uuid: ^4.5.1
  crypto: ^3.0.5
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  permission_handler: ^12.0.3
  share_plus: ^12.0.2
  open_file: ^3.5.10
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^19.5.0
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.1
  wakelock_plus: ^1.5.2
  screen_retriever: ^0.2.0
  flutter_secure_storage: ^9.2.4
  window_manager: ^0.5.1
  tray_manager: ^0.5.3
  firebase_app_check: ^0.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/tray_icon.png
    - assets/tray_icon_idle.png
    - assets/tray_icon_template.png
    - assets/tray_icon_active.png

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_1024.png"
    icon_size: 256
